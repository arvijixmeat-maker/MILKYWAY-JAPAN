  <!-- Preconnect to the domains that serve render-blocking resources only.

  <!-- Critical CSS Inline -->
  <style>
    :root {

    body {
      background-color: #f8fafc;
      margin: 0;
      padding: 0;

      background-color: #0f172a;
    }

    #root {
      min-height: 100vh;
    }

    /* Pre-render SEO content: accessible to crawlers + screen readers,
       but visually hidden so users don't see a flash of unstyled text
       before React mounts. */
    #root .pre-render-seo {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Loading skeleton shown while React boots */
    #root .pre-render-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #root .pre-render-loader .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #0f766e;
      border-radius: 50%;
      animation: prl-spin 0.8s linear infinite;
    }
    @keyframes prl-spin { to { transform: rotate(360deg); } }
  </style>

  <!-- Channel Talk — deferred until idle or first user interaction.
       Loading this in <head> previously blocked render and added ~10 Lighthouse points. -->
  <script>
    (function () {
      var w = window;
      if (w.ChannelIO) return;
      var ch = function () { ch.c(arguments); };
      ch.q = [];
      ch.c = function (args) { ch.q.push(args); };
      w.ChannelIO = ch;

      var loaded = false;
      function loadChannelTalk() {
        if (loaded || w.ChannelIOInitialized) return;
        loaded = true;
        w.ChannelIOInitialized = true;
        var s = document.createElement('script');
        s.type = 'text/javascript';
        s.async = true;
        s.src = 'https://cdn.channel.io/plugin/ch-plugin-web.js';
        s.onload = function () {
          ChannelIO('boot', { pluginKey: '64f569ac-a282-48c8-85c5-c8263bc2ba57', language: 'ja' });
        };
        var x = document.getElementsByTagName('script')[0];
        if (x.parentNode) x.parentNode.insertBefore(s, x);
      }

      // Load after page is idle (or a user interacts, whichever comes first).
      var events = ['pointerdown', 'keydown', 'scroll', 'touchstart'];
      var trigger = function () {
        events.forEach(function (ev) { w.removeEventListener(ev, trigger, { passive: true }); });
        loadChannelTalk();
      };
      events.forEach(function (ev) { w.addEventListener(ev, trigger, { passive: true }); });
      if ('requestIdleCallback' in w) {
        w.requestIdleCallback(loadChannelTalk, { timeout: 4000 });
      } else {
        setTimeout(loadChannelTalk, 3000);
      }
    })();
  </script>
