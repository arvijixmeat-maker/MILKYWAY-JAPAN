  <!-- Preconnect to the domains that serve render-blocking resources only.
       Google Fonts CSS comes from fonts.googleapis.com, fonts files from gstatic.com.
       Extra preconnects (>4) slow handshakes more than they save. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Noto Sans JP — only the weights we actually use (400 for body, 500 + 700 + 800 for UI emphasis).
       Trimming from the full 100..900 range cuts the font CSS by ~55% and reduces unused CSS flagged by Lighthouse. -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap"
    as="style" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="preload" href="/fonts/FlightSans-Regular.woff2" as="font" type="font/woff2" crossorigin />

  <!-- Material Symbols — display=block prevents FOUT (no ligature text flash).
       Loaded synchronously so @font-face is parsed before icons render. -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />

  <!-- Critical CSS Inline -->
  <style>
    /* FOUT GUARD for Material Symbols
       ─────────────────────────────────────────────────────────────────
       Material Symbols Outlined uses ligatures — class names like 'search',
       'chevron_right', 'home' resolve to icon glyphs ONLY after the font
       loads. font-display: block hides text for ~3 s, then falls back to
       the system font and shows the raw ligature names (FOUT) on slow
       mobile networks. We register a zero-sized fallback font so even if
       the icon font hasn't arrived after 3 s, the literal ligature text
       collapses to invisible width / height instead of flashing letters. */
    @font-face {
      font-family: 'MSO-fallback';
      src: local('Arial'), local('Helvetica'), local('sans-serif');
      size-adjust: 0%;
      ascent-override: 0%;
      descent-override: 0%;
      line-gap-override: 0%;
    }
    .material-symbols-outlined,
    .material-symbols-rounded,
    .material-symbols-sharp {
      font-family: 'Material Symbols Outlined', 'MSO-fallback' !important;
      /* Hide raw ligature characters until the document.fonts.ready event
         confirms the icon font is loaded (set by the inline script below).
         Layered defense on top of the size-adjust fallback above. */
      visibility: hidden;
    }
    html.mso-ready .material-symbols-outlined,
    html.mso-ready .material-symbols-rounded,
    html.mso-ready .material-symbols-sharp {
      visibility: visible;
    }

    :root {

    }

    body {

      padding: 0;
    }

    .dark body {

    }

    #root {
      min-height: 100vh;
    }

    /* Pre-render SEO content: accessible to crawlers + screen readers,
       but visually hidden so users don't see a flash of unstyled text
       before React mounts. */
    #root .pre-render-seo {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Loading skeleton shown while React boots */
    #root .pre-render-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #root .pre-render-loader .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #0f766e;
      border-radius: 50%;
      animation: prl-spin 0.8s linear infinite;
    }
    @keyframes prl-spin { to { transform: rotate(360deg); } }
  </style>

  <!-- Tag <html> once the Material Symbols font is fully loaded so the
       CSS above can un-hide icons. Pairs with the .mso-ready CSS rules
       — without this script, icons stay invisible. -->
  <script>
    (function () {
      var done = function () { document.documentElement.classList.add('mso-ready'); };
      // Safety: never leave icons hidden longer than ~4s even if fonts.ready
      // hangs on a flaky network — better to show an icon than nothing.
      var timer = setTimeout(done, 4000);
      if (document.fonts && document.fonts.load) {
        document.fonts.load('24px "Material Symbols Outlined"').then(function () {
          clearTimeout(timer);
          done();
        }).catch(function () { /* fall through to timer */ });
      } else {
        clearTimeout(timer);
        done();
      }
    })();
  </script>

  <!-- Channel Talk — stub only. The real SDK (~400KB) is loaded lazily after the
       page is fully interactive (5s after 'load') OR on the first click that calls
       window.openChannelTalk(). This keeps Channel Talk out of the LCP/TBT budget. -->
  <script>
    (function () {
      var w = window;
      if (w.ChannelIO) return;
      // Queue calls so ChannelIO('boot', ...) before the SDK arrives still works.
      var ch = function () { ch.c(arguments); };
      ch.q = [];
      ch.c = function (args) { ch.q.push(args); };
      w.ChannelIO = ch;

      var loaded = false;
      function loadChannelTalk() {
        if (loaded || w.ChannelIOInitialized) return Promise.resolve();
        loaded = true;
        w.ChannelIOInitialized = true;
        return new Promise(function (resolve) {
          var s = document.createElement('script');
          s.type = 'text/javascript';
          s.async = true;
          s.src = 'https://cdn.channel.io/plugin/ch-plugin-web.js';
          s.onload = function () {
            ChannelIO('boot', { pluginKey: '64f569ac-a282-48c8-85c5-c8263bc2ba57', language: 'ja' });
            resolve();
          };
          var x = document.getElementsByTagName('script')[0];
          if (x.parentNode) x.parentNode.insertBefore(s, x);
        });
      }

      // Expose for explicit click (footer / floating consultation button can call this
      // with a small delay to avoid blocking the interaction).
      w.openChannelTalk = function () {
        loadChannelTalk().then(function () {
          if (w.ChannelIO && typeof w.ChannelIO === 'function') {
            try { w.ChannelIO('showMessenger'); } catch (e) {}
          }
        });
      };

      // Fallback: load ~5 seconds after the page is fully interactive so returning
      // visitors still see the floating button without tanking first-load perf.
      function scheduleBackgroundLoad() {
        if ('requestIdleCallback' in w) {
          w.requestIdleCallback(loadChannelTalk, { timeout: 8000 });
        } else {
          setTimeout(loadChannelTalk, 5000);
        }
      }
      if (document.readyState === 'complete') {
        setTimeout(scheduleBackgroundLoad, 5000);
      } else {
        w.addEventListener('load', function () { setTimeout(scheduleBackgroundLoad, 5000); }, { once: true });
      }
    })();
  </script>
